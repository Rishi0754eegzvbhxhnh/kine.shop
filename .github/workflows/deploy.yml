name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Execute remote SSH commands to deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to project directory (create it if it doesn't exist)
            mkdir -p ~/shopy-stream-app
            cd ~/shopy-stream-app
            
            # Pull latest code or clone if it's the first time
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/Rishi0754eegzvbhxhnh/kine.shop.git .
            fi
            
            # Restart all Docker containers with the new code
            sudo docker-compose down
            sudo docker-compose up -d --build
            
            # Wait for MongoDB to initialize
            sleep 15
            
            # Seed the database using a temporary Node container
            sudo docker run --rm -v $(pwd):/app -w /app --network host node:18 bash -c "npm install mongodb && MONGO_URL='mongodb://localhost:27017' node seed.js"
            
            # Clean up dangling images to save disk space
            sudo docker image prune -f
